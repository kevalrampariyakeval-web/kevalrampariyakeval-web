name: Generate Snake
 
on:
  schedule:
    - cron: "0 0 * * *" # runs once a day
  workflow_dispatch: {}
  push:
    branches:
      - main
 
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: kevalrampariyakeval-web
          outputs: |
            github-snake.svg?palette=github-dark
            github-snake-dark.svg?palette=github-dark
            github-snake.gif?color_snake=#2dd4bf&color_dots=#26334d,#134e4a,#0f766e,#2dd4bf,#22d3ee
 
      - name: Push snake output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
