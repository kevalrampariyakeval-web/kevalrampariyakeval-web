        <animate attributeName="width" from="0" to="130" begin="0.63s" dur="0.9s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1"/>
      </rect>
    </g>
    <g transform="translate(-40,0)" opacity="0">
      <animateTransform attributeName="transform" type="translate" from="-40 0" to="0 0" begin="0.66s" dur="0.5s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" begin="0.66s" dur="0.5s" fill="freeze"/>
      <text x="24" y="114" font-size="13" fill="#8a97ab">Tools in Toolkit</text>
      <text x="396" y="114" font-size="13" font-weight="bold" fill="#8b5cf6" text-anchor="end">7</text>
      <rect x="24" y="122" width="372" height="5" rx="2.5" fill="#26334d"/>
      <rect x="24" y="122" width="0" height="5" rx="2.5" fill="#8b5cf6">
        <animate attributeName="width" from="0" to="200" begin="0.81s" dur="0.9s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1"/>
